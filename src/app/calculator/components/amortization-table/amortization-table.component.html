<mat-card appearance="outlined">
  <mat-card-content>
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" class="amortization-table">
        <ng-container matColumnDef="month">
          <th mat-header-cell *matHeaderCellDef>Month</th>
          <td mat-cell *matCellDef="let row">{{ row.month }}</td>
        </ng-container>

        <ng-container matColumnDef="payment">
          <th mat-header-cell *matHeaderCellDef>Payment</th>
          <td mat-cell *matCellDef="let row">{{ row.payment | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="principal">
          <th mat-header-cell *matHeaderCellDef>Principal</th>
          <td mat-cell *matCellDef="let row">{{ row.principal | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="interest">
          <th mat-header-cell *matHeaderCellDef>Interest</th>
          <td mat-cell *matCellDef="let row" class="interest-cell">{{ row.interest | currency }}</td>
        </ng-container>

        <ng-container matColumnDef="balance">
          <th mat-header-cell *matHeaderCellDef>Remaining Balance</th>
          <td mat-cell *matCellDef="let row">{{ row.balance | currency }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <mat-paginator [pageSizeOptions]="[12, 24, 60]" showFirstLastButtons></mat-paginator>
  </mat-card-content>
</mat-card>
